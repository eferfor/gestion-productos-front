<main class="main">
  <div class="content">
    <h1>Gestor de Productos</h1>
    <div class="busqueda">
      <div class="usuario">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" placeholder="Usuario..." (input)="changeUsuario($event)" [value]="usuario()" />
      </div>
      <div class="filtro">
        <label for="filtroNombre">Filtrar por nombre:</label>
        <input type="text" id="filtroNombre" placeholder="Nombre..." (input)="changeFiltroNombre($event)" [value]="filtroNombre()" />
      </div>
      <div class="filtro">
        <label for="filtroCategoria">Filtrar por categoría:</label>
        <input type="text" id="filtroCategoria" placeholder="Categoría..." (input)="changeFiltroCategoria($event)" [value]="filtroCategoria()" />
      </div>
    </div>
    <div class="tabla">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Marca</th>
            <th>Referencia</th>
            <th>Activo</th>
            <th>Fecha alta</th>
            <th>Usuario</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @if(products().length === 0){
            <tr><td colspan="11" class="vacio">{{ sinProductosMsg() }}</td></tr>
          }
          @for(product of products(); track (product.tempId ?? product.id)){
            @if(product.isNew){
              <tr app-new-table-row [product]="product" [usuario]="usuario()" (delete)="deleteRow($event)" (save)="saveProduct($event)"></tr>
            }@else {
              <tr app-table-row [product]="product" [usuario]="usuario()" (delete)="deleteRow($event)" (save)="saveProduct($event)"></tr>
            }
          }

        </tbody>
      </table>
    </div>
    <button class="newProdBtn" (click)="newRow()"><span class="orange material-symbols-outlined">add</span> Añadir producto</button>
  </div>

  <!-- DEBUG: -->
   <!--
  <p>Usuario: {{ usuario()}} - filtro nombre: {{ filtroNombre() }} - filtro categoría: {{ filtroCategoria() }}</p>
  <pre>{{ products() | json }}</pre>
  -->

</main>
